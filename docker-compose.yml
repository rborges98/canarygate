name: canarygate-local

services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.base
      target: api
      provenance: false
      sbom: false
    image: canarygate-api-local
    init: true
    env_file:
      - ./apps/web/.env.local
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@host.docker.internal:5432/canarygate}
      REDIS_URL: redis://redis:6379
      API_URL: http://localhost:3001
      WEB_URL: http://localhost:3000
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - '3001:3001'

  worker:
    build:
      context: .
      dockerfile: Dockerfile.base
      target: worker
      provenance: false
      sbom: false
    image: canarygate-worker-local
    init: true
    environment:
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@host.docker.internal:5432/canarygate}
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:
